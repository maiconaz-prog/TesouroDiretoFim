<script>
// Lógica para carregar o arquivo dados.csv automaticamente
document.addEventListener('DOMContentLoaded', function() {
    fetch('dados.csv')
        .then(response => {
            if (!response.ok) throw new Error("Arquivo dados.csv não encontrado no servidor.");
            return response.text();
        })
        .then(csvText => {
            Papa.parse(csvText, {
                header: true,
                dynamicTyping: true,
                complete: function(results) {
                    console.log("Dados carregados com sucesso:", results.data);
                    // Aqui você chama a função que renderiza seus gráficos
                    // Exemplo: inicializarDash(results.data);
                }
            });
        })
        .catch(error => {
            console.error("Erro ao carregar o site:", error);
            document.body.innerHTML += `<div style="color:red; padding:20px; text-align:center;">
                Erro: Certifique-se de que o arquivo <b>dados.csv</b> está na raiz do seu repositório GitHub.
            </div>`;
        });
});
