<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tesouro Direto — Análise</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"><\/script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"><\/script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f4f0;color:#1a1a18;font-size:14px}
/* layout */
.wrap{display:flex;min-height:100vh}
.side{width:220px;background:#fff;border-right:1px solid #e0ddd8;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.body{flex:1;padding:1.5rem;max-width:900px}
/* sidebar */
.logo{padding:1.25rem;border-bottom:1px solid #e0ddd8}
.logo h2{font-size:14px;font-weight:700}
.logo p{font-size:11px;color:#888;margin-top:2px}
.badge{font-size:10px;background:#e1f5ee;color:#085041;padding:2px 10px;border-radius:99px;font-weight:700;margin:.6rem 1rem;display:block;text-align:center}
.ns{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;padding:.75rem 1rem .3rem}
.ni{display:flex;align-items:center;gap:8px;padding:8px 1rem;font-size:13px;color:#555;cursor:pointer;border-left:2px solid transparent}
.ni:hover{background:#f5f4f0;color:#1a1a18}
.ni.on{color:#185FA5;border-left-color:#185FA5;background:#eef4fb;font-weight:700}
/* pages */
.page{display:none}.page.on{display:block}
/* header */
h1{font-size:20px;font-weight:700;margin-bottom:.25rem}
.sub{font-size:12px;color:#666;margin-bottom:1.25rem}
/* metric grid */
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:1.25rem}
.mc{background:#fff;border:1px solid #e0ddd8;border-radius:8px;padding:.75rem}
.ml{font-size:10px;color:#aaa;text-transform:uppercase;font-weight:700;letter-spacing:.04em;margin-bottom:3px}
.mv{font-size:20px;font-weight:700;color:#1a1a18}
.ms{font-size:10px;color:#aaa;margin-top:2px}
.up{color:#1D9E75}.dn{color:#A32D2D}.wn{color:#BA7517}
/* card */
.card{background:#fff;border:1px solid #e0ddd8;border-radius:10px;padding:1.1rem;margin-bottom:.9rem}
.card h3{font-size:14px;font-weight:700;margin-bottom:.3rem}
.card p{font-size:12px;color:#555;line-height:1.55}
/* chart */
.cw{position:relative;width:100%;height:240px}
/* title buttons */
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:7px;margin-bottom:1rem}
.tb{background:#fff;border:1px solid #e0ddd8;border-radius:8px;padding:.75rem;cursor:pointer;text-align:left;width:100%;transition:.15s}
.tb:hover{border-color:#aaa}
.tb.on{border-color:#185FA5;border-width:2px;background:#eef4fb}
.tb .tn{font-size:11px;font-weight:700}
.tb .tr{font-size:18px;font-weight:700;margin:2px 0}
.tb .tt{font-size:10px;color:#aaa}
/* range buttons */
.rng{display:flex;border:1px solid #ccc;border-radius:7px;overflow:hidden;width:fit-content;margin-bottom:.9rem}
.rng button{padding:5px 12px;font-size:11px;border:none;background:#fff;color:#555;cursor:pointer;font-family:inherit}
.rng button.on{background:#185FA5;color:#fff;font-weight:700}
/* alert */
.al{border-left:3px solid;border-radius:0 7px 7px 0;padding:.7rem .9rem;margin-bottom:.6rem}
.al h4{font-size:12px;font-weight:700;margin-bottom:2px}
.al p{font-size:11px;line-height:1.5}
.al-gn{border-color:#1D9E75;background:#e1f5ee}.al-gn h4{color:#085041}
.al-am{border-color:#BA7517;background:#faeeda}.al-am h4{color:#633806}
.al-bl{border-color:#185FA5;background:#eef4fb}.al-bl h4{color:#0C447C}
/* ind rows */
.ir{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f0ede8}
.ir:last-child{border-bottom:none}
.in{font-size:12px;flex:1}
.iv{font-size:12px;font-weight:700;min-width:65px;text-align:right}
.bg{font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px}
.bg-gn{background:#e1f5ee;color:#085041}.bg-rd{background:#fcebeb;color:#791F1F}
.bg-am{background:#faeeda;color:#633806}.bg-bl{background:#eef4fb;color:#0C447C}
/* perfil */
.pfb{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.pfb button{padding:6px 16px;font-size:12px;font-weight:700;border:1px solid #ccc;border-radius:7px;cursor:pointer;background:#fff;color:#555;font-family:inherit}
.pfb button.on{background:#eef4fb;color:#185FA5;border-color:#185FA5}
/* rec card */
.rc{background:#fff;border:1px solid #e0ddd8;border-radius:10px;padding:.9rem;margin-bottom:.6rem}
.rc.ft{border-color:#185FA5;border-width:2px}
.rh2{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.4rem}
.rn{font-size:13px;font-weight:700}
.rr{font-size:18px;font-weight:700}
.rd{font-size:11px;color:#555;line-height:1.5;margin-bottom:.4rem}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px}
.rat{display:flex;gap:2px;margin:4px 0}
.rt{width:9px;height:9px;border-radius:2px}.rt.on{background:#185FA5}.rt.off{background:#ddd}
/* sim */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:1rem}
.sf label{display:block;font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.sf input[type=number]{width:100%;padding:7px 10px;font-size:13px;border:1px solid #ccc;border-radius:7px}
.sf input[type=range]{width:100%;margin-top:5px}
.sv{font-size:13px;font-weight:700;margin-top:2px}
.lg{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;font-size:11px;color:#555}
.lg span{display:flex;align-items:center;gap:4px}
.ls{width:10px;height:10px;border-radius:2px}
/* section label */
.sl{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin:.9rem 0 .4rem}
/* modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.mbg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.75rem;max-width:500px;width:90%;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:700;margin-bottom:.4rem}
.modal p{font-size:12px;color:#555;line-height:1.6;margin-bottom:.9rem}
.dz{border:2px dashed #ccc;border-radius:8px;padding:1.25rem;text-align:center;cursor:pointer;transition:.2s;margin-bottom:.75rem}
.dz:hover,.dz.drag{border-color:#185FA5;background:#eef4fb}
.dz p{font-size:12px;color:#666;margin-bottom:.6rem}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;font-size:12px;font-weight:700;border-radius:7px;cursor:pointer;border:1px solid #ccc;background:#fff;color:#1a1a18;font-family:inherit}
.btn-p{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-p:hover{background:#0C447C}
.btn-gn{background:#1D9E75;color:#fff;border-color:#1D9E75}
.pb-w{height:5px;background:#eee;border-radius:99px;overflow:hidden;margin:.75rem 0 .3rem}
.pb-f{height:100%;background:#185FA5;border-radius:99px;width:0%;transition:width .3s}
.res-box{background:#e1f5ee;border:1px solid #9fe1cb;border-radius:8px;padding:1rem;margin-top:.75rem;display:none}
.err-box{background:#fcebeb;border:1px solid #f7c1c1;border-radius:8px;padding:.75rem;margin-top:.75rem;display:none;font-size:12px;color:#791F1F}
/* footer */
footer{padding:1.25rem;font-size:11px;color:#aaa;text-align:center}
footer a{color:#aaa;text-decoration:none}
@media(max-width:680px){.side{display:none}.body{padding:1rem}.sg{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- hidden update modal -->
<div class="mbg" id="modal">
 <div class="modal">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem">
   <h2>🔒 Atualizar dados</h2>
   <button class="btn" onclick="closeM()">✕</button>
  </div>
  <p>Baixe o CSV em <a href="https://www.tesourotransparente.gov.br/ckan/dataset/taxas-dos-titulos-ofertados-pelo-tesouro-direto" target="_blank" style="color:#185FA5">Tesouro Transparente</a>, carregue aqui e um <strong>index.html</strong> atualizado será baixado para você subir no GitHub.</p>
  <div class="dz" id="dz" onclick="document.getElementById('fi').click()">
   <p>📂 Arraste o CSV ou clique para selecionar</p>
   <button class="btn btn-p" onclick="event.stopPropagation();document.getElementById('fi').click()">Selecionar arquivo</button>
   <input type="file" id="fi" accept=".csv" style="display:none" onchange="handleCSV(event)">
  </div>
  <div style="display:none" id="prog"><div class="pb-w"><div class="pb-f" id="pbf"></div></div><div id="pmsg" style="font-size:11px;color:#555"></div></div>
  <div class="err-box" id="errbox"></div>
  <div class="res-box" id="resbox">
   <p style="font-size:13px;font-weight:700;color:#085041;margin-bottom:.4rem">✅ index.html gerado!</p>
   <p id="resstats" style="font-size:12px;color:#085041;margin-bottom:.75rem"></p>
   <p style="font-size:12px;color:#085041;margin-bottom:.75rem">Suba o arquivo no GitHub (Add file → Upload files) para atualizar o site.</p>
   <button class="btn btn-gn" onclick="redown()">⬇ Baixar novamente</button>
  </div>
 </div>
</div>

<div class="wrap">
 <nav class="side">
  <div class="logo"><h2>Tesouro Direto</h2><p>Análise histórica + macro</p></div>
  <span class="badge" id="sbd">carregando...</span>
  <div class="ns">Histórico</div>
  <div class="ni on" onclick="go('ov')">◉ Visão geral</div>
  <div class="ni" onclick="go('hi')">📈 Histórico</div>
  <div class="ni" onclick="go('re')">💡 Quando resgatar</div>
  <div class="ns">Inteligente</div>
  <div class="ni" onclick="go('ma')">🏛 Painel macro</div>
  <div class="ni" onclick="go('ti')">⭐ Qual título</div>
  <div class="ni" onclick="go('ce')">🔮 Cenários</div>
  <div class="ni" onclick="go('si')">🧮 Simulador</div>
 </nav>
 <main class="body">

  <!-- VISÃO GERAL -->
  <div id="pov" class="page on">
   <h1>Visão geral</h1>
   <p class="sub">Taxas e preços atuais de todos os títulos</p>
   <div class="mg" id="ovm"></div>
   <div class="card">
    <h3>Taxas de compra atuais por título</h3>
    <p style="margin-bottom:.75rem">Comparativo da última data disponível no arquivo</p>
    <div class="cw"><canvas id="cc"></canvas></div>
    <div class="lg" id="lgc" style="margin-top:.6rem"></div>
   </div>
   <div class="sl">Clique em um título para ver o histórico completo</div>
   <div class="tg" id="tco"></div>
  </div>

  <!-- HISTÓRICO -->
  <div id="phi" class="page">
   <h1>Histórico por título</h1>
   <p class="sub">Selecione um título para ver a evolução de taxa e preço</p>
   <div class="tg" id="tch"></div>
   <div id="hdd" style="display:none">
    <div class="mg" id="hm"></div>
    <div class="rng">
     <button onclick="setR('6m')">6 meses</button>
     <button onclick="setR('1a')">1 ano</button>
     <button class="on" onclick="setR('2a')">2 anos</button>
     <button onclick="setR('max')">Máximo</button>
    </div>
    <div class="card"><h3 id="htt">Taxa histórica</h3><p style="margin-bottom:.75rem">% ao ano — quanto maior a taxa, menor o preço unitário</p><div class="cw"><canvas id="ct"></canvas></div></div>
    <div class="card"><h3 id="hpt">PU de compra histórico</h3><p style="margin-bottom:.75rem">R$ — inversamente proporcional à taxa</p><div class="cw"><canvas id="cpu"></canvas></div></div>
   </div>
  </div>

  <!-- RESGATAR -->
  <div id="pre" class="page">
   <h1>Quando resgatar</h1>
   <p class="sub">Guia prático + análise automática do momento atual</p>
   <div id="rec"></div>
  </div>

  <!-- MACRO -->
  <div id="pma" class="page">
   <h1>Painel macroeconômico</h1>
   <p class="sub">Indicadores atualizados · mai/2026 · Focus/BCB, IBGE, FMI</p>
   <div class="mg" style="grid-template-columns:repeat(auto-fit,minmax(130px,1fr))">
    <div class="mc"><div class="ml">Selic atual</div><div class="mv wn">14,75%</div><div class="ms">1.º corte pós-ciclo</div></div>
    <div class="mc"><div class="ml">Selic fim 2026</div><div class="mv">13,00%</div><div class="ms">projeção Focus</div></div>
    <div class="mc"><div class="ml">IPCA 12 meses</div><div class="mv wn">4,14%</div><div class="ms">abr/26 · meta 3% ±1,5</div></div>
    <div class="mc"><div class="ml">IPCA proj. 2026</div><div class="mv dn">4,80%</div><div class="ms">acima do teto (4,5%)</div></div>
    <div class="mc"><div class="ml">PIB 2026</div><div class="mv up">+1,8%</div><div class="ms">projeção Focus</div></div>
    <div class="mc"><div class="ml">Dívida bruta/PIB</div><div class="mv dn">~79%</div><div class="ms">trajetória ascendente</div></div>
    <div class="mc"><div class="ml">Dólar fin 2026</div><div class="mv">R$ 5,30</div><div class="ms">projeção Focus</div></div>
    <div class="mc"><div class="ml">Juro real</div><div class="mv up">~10,6%</div><div class="ms">2.º maior do mundo</div></div>
   </div>
   <div class="card"><h3>Sinais para o investidor</h3>
    <div class="sl">Política monetária</div>
    <div class="ir"><span class="in">Selic — ciclo de cortes iniciado</span><span class="iv">14,75%</span><span class="bg bg-am">Atenção</span></div>
    <div class="ir"><span class="in">Projeção Selic dez/2026 (Focus)</span><span class="iv">13,00%</span><span class="bg bg-am">Corte gradual</span></div>
    <div class="ir"><span class="in">Selic projetada 2027 (Focus)</span><span class="iv">11,00%</span><span class="bg bg-gn">Queda contínua</span></div>
    <div class="sl">Inflação</div>
    <div class="ir"><span class="in">IPCA acumulado 12 meses (abr/26)</span><span class="iv">4,14%</span><span class="bg bg-am">Pressionado</span></div>
    <div class="ir"><span class="in">IPCA projetado 2026 (Focus)</span><span class="iv">4,80%</span><span class="bg bg-rd">Acima do teto</span></div>
    <div class="ir"><span class="in">Meta do Banco Central</span><span class="iv">3% ±1,5</span><span class="bg bg-bl">Teto: 4,5%</span></div>
    <div class="sl">Fiscal</div>
    <div class="ir"><span class="in">Dívida bruta / PIB (jan/26)</span><span class="iv">~79%</span><span class="bg bg-rd">Trajetória alta</span></div>
    <div class="ir"><span class="in">FMI: dívida projetada 2027</span><span class="iv">~100%</span><span class="bg bg-rd">Risco fiscal alto</span></div>
    <div class="ir"><span class="in">Juro real (Selic − IPCA proj.)</span><span class="iv">~10,6%</span><span class="bg bg-gn">2.º maior mundo</span></div>
    <div class="sl">Câmbio e atividade</div>
    <div class="ir"><span class="in">Dólar projetado dez/2026 (Focus)</span><span class="iv">R$ 5,30</span><span class="bg bg-gn">Real valorizado</span></div>
    <div class="ir"><span class="in">PIB 2026 (projeção)</span><span class="iv">+1,8%</span><span class="bg bg-am">Desaceleração</span></div>
   </div>
   <div class="card"><h3>Leitura atual</h3><p>Selic a 14,75% com cortes graduais projetados, inflação acima do teto, fiscal deteriorando e juro real de ~10,6% — o segundo maior do mundo. Ambiente muito favorável à renda fixa. Tesouro Selic garante retorno elevado com risco mínimo. IPCA+ oferece oportunidade histórica de travar taxa real alta. Prefixado tem apelo se o investidor acredita que a Selic cairá mais do que o mercado projeta.</p></div>
  </div>

  <!-- QUAL TÍTULO -->
  <div id="pti" class="page">
   <h1>Qual título escolher agora</h1>
   <p class="sub">Recomendações por perfil · cenário mai/2026</p>
   <div class="pfb">
    <button class="on" onclick="setP('c')">Conservador</button>
    <button onclick="setP('m')">Moderado</button>
    <button onclick="setP('a')">Arrojado</button>
   </div>
   <div id="pfc"></div>
  </div>

  <!-- CENÁRIOS -->
  <div id="pce" class="page">
   <h1>Cenários futuros</h1>
   <p class="sub">Como cada cenário macroeconômico afeta os títulos</p>
   <div class="card"><h3>🟢 Cenário base — mais provável</h3><p style="margin-bottom:.75rem">Selic cai para ~13% até dez/2026 e ~11% em 2027. IPCA converge lentamente. Dívida/PIB sobe para ~85%.</p>
    <div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f0ede8;align-items:flex-start"><div style="width:30px;height:30px;border-radius:50%;background:#eef4fb;color:#0C447C;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">S</div><div><div style="font-size:12px;font-weight:700">Tesouro Selic — excelente no curto prazo</div><div style="font-size:11px;color:#555">Retorno superior a 13% a.a. até meados de 2027. Risco próximo de zero.</div></div></div>
    <div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f0ede8;align-items:flex-start"><div style="width:30px;height:30px;border-radius:50%;background:#e1f5ee;color:#085041;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">I+</div><div><div style="font-size:12px;font-weight:700">Tesouro IPCA+ — oportunidade histórica de taxa real</div><div style="font-size:11px;color:#555">Taxa real de ~7% a.a. Se Selic cair, PU sobe e investidor captura valorização além do contrato.</div></div></div>
    <div style="display:flex;gap:10px;padding:8px 0;align-items:flex-start"><div style="width:30px;height:30px;border-radius:50%;background:#faeeda;color:#633806;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">P</div><div><div style="font-size:12px;font-weight:700">Prefixado — interessante, mas com risco</div><div style="font-size:11px;color:#555">Se Selic cair, ganho de capital. Risco: IPCA persistente pode forçar BC a pausar cortes.</div></div></div>
   </div>
   <div class="card"><h3>⭐ Cenário otimista</h3><p>IPCA converge para 3,5% e Selic atinge 10% em 2028. Melhor cenário para IPCA+ longo e Prefixado: PU dispara. Quem comprou IPCA+ 2035 com taxa real de 7% e ela cair para 5% teria ganho expressivo de capital.</p></div>
   <div class="card"><h3>🔴 Cenário pessimista — deterioração fiscal</h3><p>Selic precisa subir ou fica estagnada. Dívida caminha para 100% do PIB (projeção FMI). Tesouro Selic vence: retorno garantido. IPCA+ sofre no PU mas protege no vencimento. Prefixado é o mais vulnerável — evitar no longo prazo nesse cenário.</p></div>
  </div>

  <!-- SIMULADOR -->
  <div id="psi" class="page">
   <h1>Simulador de rentabilidade</h1>
   <p class="sub">Crescimento estimado líquido de IR</p>
   <div class="card">
    <div class="sg">
     <div class="sf"><label>Valor investido (R$)</label><input type="number" id="sv" value="10000" min="30" step="500" oninput="sim()"></div>
     <div class="sf"><label>Prazo</label><input type="range" id="sp" min="1" max="20" value="5" step="1" oninput="sim()"><div class="sv"><span id="spv">5</span> anos</div></div>
     <div class="sf"><label>IPCA médio projetado</label><input type="range" id="si" min="2" max="9" value="4.5" step="0.5" oninput="sim()"><div class="sv"><span id="siv">4,5</span>% a.a.</div></div>
     <div class="sf"><label>Selic média projetada</label><input type="range" id="ss" min="8" max="16" value="12" step="0.5" oninput="sim()"><div class="sv"><span id="ssv">12,0</span>% a.a.</div></div>
    </div>
    <div class="mg" id="smm"></div>
    <div class="cw" style="height:280px;margin-top:.75rem"><canvas id="cs"></canvas></div>
    <div class="lg" id="slg"></div>
    <p style="font-size:10px;color:#aaa;margin-top:.75rem">IR regressivo (22,5% até 6m → 15% após 2 anos). Não inclui taxa de custódia B3 (0,2% a.a.). Simulação aproximada.</p>
   </div>
  </div>

 </main>
</div>

<footer>Tesouro Direto · Dados: <a href="https://www.tesourotransparente.gov.br" target="_blank">Tesouro Transparente</a> · <a href="#" onclick="openM();return false" style="color:#f5f4f0">·</a></footer>

var CL={'Tesouro Selic':'#185FA5','Tesouro IPCA+':'#1D9E75','Tesouro Prefixado':'#BA7517','Tesouro IPCA+ com Juros Semestrais':'#0F6E56','Tesouro Prefixado com Juros Semestrais':'#854F0B'};
function gc(n){for(var k in CL)if(n&&n.indexOf(k)>-1)return CL[k];return '#888';}

// ── UTIL ─────────────────────────────────────────────
function fr(v){return v!=null?(v*100).toFixed(2)+'%':'—';}
function fp(v){return v!=null?'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';}
function fd(d){return d&&!isNaN(d)?d.toLocaleDateString('pt-BR'):'—';}
function latest(rows){return rows.reduce(function(a,b){return a.d>b.d?a:b;});}
function prevYear(rows){var t=new Date(Date.now()-365*864e5),best=null,bd=Infinity;rows.forEach(function(r){var df=Math.abs(r.d-t);if(df<bd){bd=df;best=r;}});return best;}
function filt(rows,range){var days={max:99999,'2a':730,'1a':365,'6m':180}[range]||730,cut=new Date(Date.now()-days*864e5);return rows.filter(function(r){return r.d>=cut;}).sort(function(a,b){return a.d-b.d;});}
function thin(rows,max){if(rows.length<=max)return rows;var s=Math.ceil(rows.length/max);return rows.filter(function(_,i){return i%s===0||i===rows.length-1;});}

var charts={};
function dc(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

// ── SIDEBAR DATE ─────────────────────────────────────
var lat=D.reduce(function(a,b){return a.d>b.d?a:b;});
var old=D.reduce(function(a,b){return a.d<b.d?a:b;});
document.getElementById('sbd').textContent='Atualizado: '+fd(lat.d);

// ── VISÃO GERAL ──────────────────────────────────────
(function(){
  var avg=0,cnt=0;
  titles.forEach(function(t){var l=latest(G[t]);if(l.r){avg+=l.r;cnt++;}});
  avg=cnt?avg/cnt:0;
  var anos=Math.round((lat.d-old.d)/864e5/365);
  document.getElementById('ovm').innerHTML=
   mk('Títulos',titles.length,'tipos disponíveis')+
   mk('Registros',D.length.toLocaleString('pt-BR'),'dias úteis')+
   mk('Taxa média atual',fr(avg),'entre títulos')+
   mk('Histórico',anos+' anos',fd(old.d)+' → '+fd(lat.d),'up');
  function mk(l,v,s,cls){return '<div class="mc"><div class="ml">'+l+'</div><div class="mv'+(cls?' '+cls:'')+'" >'+v+'</div><div class="ms">'+s+'</div></div>';}

  var ns=[],rs=[],cs=[];
  titles.forEach(function(t){var l=latest(G[t]);if(!l.r)return;ns.push(t.replace('Tesouro ','T. '));rs.push(+(l.r*100).toFixed(2));cs.push(gc(t));});
  dc('cc');
  charts['cc']=new Chart(document.getElementById('cc'),{type:'bar',data:{labels:ns,datasets:[{data:rs,backgroundColor:cs.map(function(c){return c+'cc';}),borderColor:cs,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.parsed.x.toFixed(2)+'% a.a.';}}}}},scales:{x:{ticks:{callback:function(v){return v+'%';}},grid:{color:'rgba(0,0,0,.05)'}},y:{grid:{display:false}}}}});
  document.getElementById('lgc').innerHTML=ns.map(function(n,i){return '<span><span class="ls" style="background:'+cs[i]+'"></span>'+n+': '+rs[i]+'%</span>';}).join('');

  var h1='',h2='';
  titles.forEach(function(t){
    var l=latest(G[t]),c=gc(t);
    var inner='<div class="tn">'+t+'</div><div class="tr" style="color:'+c+'">'+fr(l.r)+'</div><div class="tt">'+G[t].length.toLocaleString('pt-BR')+' registros</div>';
    h1+='<button class="tb" onclick="goHi(''+esc(t)+'')">'+inner+'</button>';
    h2+='<button class="tb" data-t="'+esc(t)+'" onclick="selHi(''+esc(t)+'')">'+inner+'</button>';
  });

  document.getElementById('tch').innerHTML=h2;

  // resgatar
  var now=new Date(),rh='';
  [{c:'al-gn',t:'Tesouro Selic — resgate a qualquer momento',b:'Liquidez diária real sem perda relevante. Ideal para reserva de emergência. Taxa acompanha a Selic — quando sobe, rendimento sobe junto.'},{c:'al-am',t:'Tesouro IPCA+ — atenção ao momento',b:'Taxa atual MAIOR que quando comprou → PU caiu, aguarde o vencimento. Taxa atual MENOR → PU subiu, bom momento de venda antecipada com lucro extra.'},{c:'al-am',t:'Tesouro Prefixado — só venda antecipado se a taxa caiu',b:'Taxa de mercado MENOR que taxa da sua compra → PU subiu → lucro antecipado. Taxa subiu → leve ao vencimento para garantir a taxa contratada.'},{c:'al-gn',t:'Regra de ouro: taxa alta = preço baixo (comprar) · taxa baixa = preço alto (vender)',b:'Monitore a variação da taxa neste site. Quando a taxa atual está abaixo da taxa da sua compra, o momento de resgate antecipado do IPCA+ e Prefixado é favorável.'}].forEach(function(g){rh+='<div class="al '+g.c+'"><h4>'+g.t+'</h4><p>'+g.b+'</p></div>';});
  rh+='<div class="sl" style="margin-top:1.2rem">Análise automática — taxa atual vs. média dos últimos 2 anos</div>';
  titles.forEach(function(t){
    var rows=G[t],l=latest(rows),l2y=rows.filter(function(r){return (now-r.d)<730*864e5;});
    if(!l2y.length||!l.r)return;
    var avg2=l2y.reduce(function(s,r){return s+(r.r||0);},0)/l2y.length;
    var above=l.r>avg2*1.02;
    rh+='<div class="al '+(above?'al-gn':'al-bl')+'"><h4>'+t+' — '+(above?'taxa acima da média':'taxa abaixo da média')+' dos últimos 2 anos</h4><p>Atual: <b>'+fr(l.r)+'</b> · Média 2 anos: <b>'+fr(avg2)+'</b> · '+(above?'Momento favorável para compra.':'Favorável para resgate antecipado do IPCA+ e Prefixado.')+'</p></div>';
  });
  document.getElementById('rec').innerHTML=rh;
})();

var selT=null,selR='2a';
function goHi(t){selT=t;go('hi');selHi(t);}
function selHi(t){
  selT=t;
  document.querySelectorAll('#tch .tb').forEach(function(b){b.classList.toggle('on',b.dataset.t===t);});
  document.getElementById('hdd').style.display='block';
  drawHist();
}
function setR(r){
  selR=r;
  var map={max:'Máximo','2a':'2 anos','1a':'1 ano','6m':'6 meses'};
  document.querySelectorAll('.rng button').forEach(function(b){b.classList.toggle('on',b.textContent===map[r]);});
  if(selT)drawHist();
}
function drawHist(){
  var rows=G[selT]||[],f=thin(filt(rows,selR),250);

   '<div class="mc"><div class="ml">Var. 12 meses</div><div class="mv '+(diff==null?'':diff>0?'up':'dn')+'" style="font-size:15px">'+(diff!=null?(diff>0?'+':'')+((diff*100).toFixed(2))+'pp':'—')+'</div><div class="ms">na taxa a.a.</div></div>';
  dc('ct');

c:'bg-bl'}]},{n:'Tesouro Prefixado 2031',t:'~13,5–14%',col:'#BA7517',rec:0,r:7,d:'Aposta em queda mais intensa da Selic. Ganho de capital se taxa cair para 9–10%.',m:'Para quem acredita em cenário fiscal melhor que o consenso.',tg:[{t:'Alta alavancagem taxa',c:'bg-am'},{t:'Ganho capital potencial',c:'bg-gn'},{t:'Risco elevado',c:'bg-rd'}]}]};

// ── SIMULADOR ────────────────────────────────────────
function sim(){
  var v=parseFloat(document.getElementById('sv').value)||10000;
  var a=parseInt(document.getElementById('sp').value)||5;
  var ip=parseFloat(document.getElementById('si').value)/100;
  var se=parseFloat(document.getElementById('ss').value)/100;
  document.getElementById('spv').textContent=a;
  document.getElementById('siv').textContent=(ip*100).toFixed(1).replace('.',',');
  document.getElementById('ssv').textContent=(se*100).toFixed(1).replace('.',',');
  var ir=a<=0.5?0.225:a<=1?.20:a<=2?.175:.15;
  function calc(r){var b=v*Math.pow(1+r,a);return Math.round(v+(b-v)*(1-ir));}
  function fb(n){return 'R$ '+n.toLocaleString('pt-BR');}
  var rS=calc(se),rI=calc(ip+.07),rP=calc(.135),rPoup=calc(.065);
  document.getElementById('smm').innerHTML=
   '<div class="mc"><div class="ml">Tesouro Selic</div><div class="mv up" style="font-size:15px">'+fb(rS)+'</div><div class="ms">líquido de IR</div></div>'+
   '<div class="mc"><div class="ml">Tesouro IPCA+</div><div class="mv up" style="font-size:15px">'+fb(rI)+'</div><div class="ms">líquido de IR</div></div>'+
   '<div class="mc"><div class="ml">Prefixado</div><div class="mv up" style="font-size:15px">'+fb(rP)+'</div><div class="ms">líquido de IR</div></div>'+
   '<div class="mc"><div class="ml">Poupança</div><div class="mv dn" style="font-size:15px">'+fb(rPoup)+'</div><div class="ms">referência</div></div>';
  var ls=['Hoje'],dS=[v],dI=[v],dP=[v],dPoup=[v];
  for(var i=1;i<=a;i++){ls.push('Ano '+i);dS.push(Math.round(v*Math.pow(1+se,i)));dI.push(Math.round(v*Math.pow(1+ip+.07,i)));dP.push(Math.round(v*Math.pow(1+.135,i)));dPoup.push(Math.round(v*Math.pow(1+.065,i)));}
  dc('cs');
  charts['cs']=new Chart(document.getElementById('cs'),{type:'line',data:{labels:ls,datasets:[{label:'Selic',data:dS,borderColor:'#185FA5',fill:false,tension:.3,pointRadius:3,borderWidth:2},{label:'IPCA+',data:dI,borderColor:'#1D9E75',fill:false,tension:.3,pointRadius:3,borderWidth:2,borderDash:[5,3]},{label:'Prefixado',data:dP,borderColor:'#BA7517',fill:false,tension:.3,pointRadius:3,borderWidth:2,borderDash:[2,4]},{label:'Poupança',data:dPoup,borderColor:'#888',fill:false,tension:.3,pointRadius:2,borderWidth:1.5,borderDash:[1,3]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{callback:function(v){return 'R$'+Math.round(v/1000)+'k';}},grid:{color:'rgba(0,0,0,.04)'}}}}});
  document.getElementById('slg').innerHTML=[['#185FA5','Tesouro Selic'],['#1D9E75','Tesouro IPCA+'],['#BA7517','Prefixado'],['#888','Poupança']].map(function(x){return '<span><span class="ls" style="background:'+x[0]+'"></span>'+x[1]+'</span>';}).join('');
}

// ── MODAL ────────────────────────────────────────────
function openM(){document.getElementById('modal').classList.add('open');}
function closeM(){document.getElementById('modal').classList.remove('open');}
var dzel=document.getElementById('dz');
dzel.addEventListener('dragover',function(e){e.preventDefault();dzel.classList.add('drag');});
dzel.addEventListener('dragleave',function(){dzel.classList.remove('drag');});
dzel.addEventListener('drop',function(e){e.preventDefault();dzel.classList.remove('drag');var f=e.dataTransfer.files[0];if(f)procCSV(f);});
function handleCSV(e){var f=e.target.files[0];if(f)procCSV(f);}

var blob=null;
function redown(){if(blob){var u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download='index.html';a.click();setTimeout(function(){URL.revokeObjectURL(u);},1000);}}
function setprog(pct,msg){document.getElementById('pbf').style.width=pct+'%';document.getElementById('pmsg').textContent=msg;}
function showerr(msg){document.getElementById('errbox').style.display='block';document.getElementById('errbox').textContent='❌ '+msg;document.getElementById('prog').style.display='none';}

function procCSV(file){
  document.getElementById('prog').style.display='block';
  document.getElementById('resbox').style.display='none';
  document.getElementById('errbox').style.display='none';
  setprog(10,'Lendo arquivo...');
  var r=new FileReader();
  r.onerror=function(){showerr('Erro ao ler o arquivo.');};
  r.onload=function(e){
    try{
      setprog(40,'Processando CSV...');
      var parsed=Papa.parse(e.target.result,{header:true,skipEmptyLines:true,delimiter:';'});
      if(!parsed.data.length)throw new Error('Arquivo vazio ou delimitador inválido.');
      var keys=Object.keys(parsed.data[0]);
      function get(row,pats){for(var i=0;i<pats.length;i++)for(var j=0;j<keys.length;j++)if(keys[j].toLowerCase().replace(/\s+/g,'').indexOf(pats[i].toLowerCase().replace(/\s+/g,''))>-1)return row[keys[j]];return null;}
      function pd(s){if(!s)return null;var p=s.trim().split('/');return p.length===3?new Date(+p[2],+p[1]-1,+p[0]).toISOString().slice(0,10):null;}
      function pu(s){if(!s)return null;var v=parseFloat(s.trim().replace(/\./g,'').replace(',','.'));return isNaN(v)?null:v;}
      function pr(s){if(!s)return null;var v=parseFloat(s.trim().replace(',','.'));return isNaN(v)?null:v/100;}
      var nd=parsed.data.map(function(row){return{n:(get(row,['TipoTitulo','Tipo Titulo'])||'').trim(),d:pd(get(row,['DataBase','Data Base'])),r:pr(get(row,['TaxaCompraM','Taxa Compra Manha'])),p:pu(get(row,['PUCompraM','PU Compra Manha'])),};}).filter(function(x){return x.d&&x.n;});
      if(!nd.length)throw new Error('Nenhum registro válido. Verifique se é o CSV correto do Tesouro Direto.');
      setprog(80,'Gerando index.html...');
      var tits=[...new Set(nd.map(function(x){return x.n;}))];
      var ds=nd.map(function(x){return x.d;}).sort();
      var anos=Math.round((new Date(ds[ds.length-1])-new Date(ds[0]))/864e5/365);
      var newJSON=JSON.stringify(nd,null,0);
      var html=document.documentElement.outerHTML;
      var final=html.replace(/var RAW=\[.*?\];/s,'var RAW='+newJSON+';');
      blob=new Blob([final],{type:'text/html;charset=utf-8'});
      redown();
      document.getElementById('resstats').textContent=nd.length.toLocaleString('pt-BR')+' registros · '+tits.length+' títulos · '+anos+' anos de histórico';
      document.getElementById('resbox').style.display='block';
      document.getElementById('prog').style.display='none';
    }catch(err){showerr(err.message);}
  };
  r.readAsText(file,'latin1');
}
function esc(s){return s.replace(/'/g,"\\'");}
</script>
