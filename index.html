<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesouro Direto — Análise Completa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"><\/script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"><\/script>
<style>
:root{--bg:#f8f7f4;--sf:#fff;--sf2:#f1f0ec;--bd:rgba(0,0,0,.1);--bd2:rgba(0,0,0,.18);--tx:#1a1a18;--tx2:#5f5e5a;--tx3:#888780;--bl:#185FA5;--bl-l:#E6F1FB;--bl-d:#0C447C;--gn:#1D9E75;--gn-l:#E1F5EE;--gn-d:#085041;--am:#BA7517;--am-l:#FAEEDA;--am-d:#633806;--rd:#A32D2D;--rd-l:#FCEBEB;--rd-d:#791F1F;--r:10px;--rl:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.6}
.app{display:flex;min-height:100vh}
.sb{width:240px;background:var(--sf);border-right:1px solid var(--bd);padding:1.5rem 0;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.mn{flex:1;padding:2rem;overflow-x:hidden;max-width:960px}
.sb-logo{padding:0 1.25rem 1.25rem;border-bottom:1px solid var(--bd);margin-bottom:.75rem}
.sb-logo h2{font-size:15px;font-weight:700;color:var(--tx)}
.sb-logo p{font-size:11px;color:var(--tx3);margin-top:2px}
.db{font-size:10px;background:var(--gn-l);color:var(--gn-d);padding:3px 10px;border-radius:99px;font-weight:700;margin:0 1.25rem .75rem;display:block;text-align:center}
.ns{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;padding:.9rem 1.25rem .35rem}
.ni{display:flex;align-items:center;gap:10px;padding:9px 1.25rem;font-size:13px;color:var(--tx2);cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.ni:hover{background:var(--sf2);color:var(--tx)}
.ni.on{color:var(--bl);border-left-color:var(--bl);background:var(--bl-l);font-weight:700}
.ph{margin-bottom:1.5rem}
.ph h1{font-size:22px;font-weight:700}
.ph p{font-size:13px;color:var(--tx2);margin-top:4px}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem}
.mc{background:var(--sf2);border-radius:var(--r);padding:.9rem 1rem}
.ml{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;font-weight:700}
.mv{font-size:21px;font-weight:700;color:var(--tx);line-height:1.1}
.ms{font-size:10px;color:var(--tx3);margin-top:3px}
.mv.up{color:var(--gn)}.mv.dn{color:var(--rd)}.mv.wn{color:var(--am)}
.cd{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.cd h3{font-size:15px;font-weight:700;margin-bottom:.4rem}
.cd p{font-size:13px;color:var(--tx2);line-height:1.6}
.cw{position:relative;width:100%;height:260px}
.cw.tl{height:320px}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:8px;margin-bottom:1.25rem}
.tb{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:.85rem 1rem;cursor:pointer;text-align:left;transition:all .15s;width:100%}
.tb:hover{border-color:var(--bd2);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.tb.on{border-color:var(--bl);border-width:1.5px;background:var(--bl-l)}
.tb .tn{font-size:11px;font-weight:700;color:var(--tx);margin-bottom:2px}
.tb .tr{font-size:20px;font-weight:700;margin:3px 0}
.tb .tt{font-size:10px;color:var(--tx3)}
.rb{display:flex;border-radius:var(--r);overflow:hidden;border:1px solid var(--bd2);width:fit-content;margin-bottom:1rem}
.rb button{padding:6px 14px;font-size:12px;cursor:pointer;border:none;background:var(--sf);color:var(--tx2);font-family:inherit;transition:all .15s}
.rb button:hover{background:var(--sf2)}
.rb button.on{background:var(--bl);color:#fff;font-weight:700}
.ir{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}
.ir:last-child{border-bottom:none}
.in{font-size:13px;flex:1}
.iv{font-size:13px;font-weight:700;min-width:70px;text-align:right}
.bg{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap}
.bg-gn{background:var(--gn-l);color:var(--gn-d)}.bg-rd{background:var(--rd-l);color:var(--rd-d)}.bg-am{background:var(--am-l);color:var(--am-d)}.bg-bl{background:var(--bl-l);color:var(--bl-d)}
.al{border-left:3px solid;border-radius:0 var(--r) var(--r) 0;padding:.85rem 1rem;margin-bottom:.75rem}
.al h4{font-size:13px;font-weight:700;margin-bottom:3px}
.al p{font-size:12px;line-height:1.55}
.al-gn{border-color:var(--gn);background:var(--gn-l)}.al-gn h4{color:var(--gn-d)}
.al-am{border-color:var(--am);background:var(--am-l)}.al-am h4{color:var(--am-d)}
.al-bl{border-color:var(--bl);background:var(--bl-l)}.al-bl h4{color:var(--bl-d)}
.al-rd{border-color:var(--rd);background:var(--rd-l)}.al-rd h4{color:var(--rd-d)}
.rc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:.75rem}
.rc.ft{border-color:var(--bl);border-width:1.5px}
.rh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem}
.rn{font-size:14px;font-weight:700}
.rr{font-size:20px;font-weight:700}
.rd{font-size:12px;color:var(--tx2);line-height:1.55;margin-bottom:.5rem}
.tgs{display:flex;gap:5px;flex-wrap:wrap}
.tg2{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem}
.sf label{display:block;font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:6px}
.sf input[type=number]{width:100%;padding:8px 12px;font-size:14px;border:1px solid var(--bd2);border-radius:var(--r);background:var(--sf);color:var(--tx)}
.sf input[type=range]{width:100%;margin-top:6px}
.sv{font-size:14px;font-weight:700;margin-top:3px}
.lg{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;font-size:12px;color:var(--tx2)}
.lg span{display:flex;align-items:center;gap:5px}
.ls{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.pb-wrap{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.pb{padding:8px 18px;font-size:13px;font-weight:700;border:1px solid var(--bd2);border-radius:var(--r);cursor:pointer;background:var(--sf);color:var(--tx2);font-family:inherit;transition:all .15s}
.pb.on{background:var(--bl-l);color:var(--bl-d);border-color:var(--bl)}
.sr{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd);align-items:flex-start}
.sr:last-child{border-bottom:none}
.si{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.st{font-size:13px;font-weight:700;margin-bottom:2px}
.ss{font-size:12px;color:var(--tx2);line-height:1.55}
.hd{display:none!important}
.sl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin:1rem 0 .5rem}
.rat{display:flex;gap:2px;margin:5px 0}
.rt{width:10px;height:10px;border-radius:2px}
.rt.on{background:var(--bl)}.rt.off{background:var(--bd)}
/* Update modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--sf);border-radius:var(--rl);padding:2rem;max-width:540px;width:90%;max-height:90vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:700;margin-bottom:.5rem}
.modal p{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:1rem}
.dz{border:2px dashed var(--bd2);border-radius:var(--r);padding:1.5rem;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:1rem}
.dz:hover,.dz.drag{border-color:var(--bl);background:var(--bl-l)}
.dz p{font-size:13px;color:var(--tx2);margin-bottom:.75rem}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;font-size:13px;font-weight:700;border-radius:var(--r);cursor:pointer;border:1px solid var(--bd2);background:var(--sf);color:var(--tx);font-family:inherit;transition:all .15s}
.btn:hover{background:var(--sf2)}
.btn-p{background:var(--bl);color:#fff;border-color:var(--bl)}
.btn-p:hover{background:var(--bl-d)}
.btn-gn{background:var(--gn);color:#fff;border-color:var(--gn)}
.btn-gn:hover{background:var(--gn-d)}
.prog{margin-top:1rem}
.pb-bar{height:6px;background:var(--bd);border-radius:99px;overflow:hidden;margin-bottom:.4rem}
.pb-fill{height:100%;background:var(--bl);border-radius:99px;width:0%;transition:width .3s}
.res{background:var(--gn-l);border:1px solid #9FE1CB;border-radius:var(--r);padding:1.25rem;margin-top:1rem;display:none}
.res h3{font-size:14px;font-weight:700;color:var(--gn-d);margin-bottom:.5rem}
.res p{font-size:12px;color:var(--gn-d);margin-bottom:.75rem}
.err{background:var(--rd-l);border:1px solid #F7C1C1;border-radius:var(--r);padding:1rem;margin-top:1rem;display:none}
.err p{font-size:12px;color:var(--rd-d)}
/* Footer secret trigger */
footer{text-align:center;padding:2rem;color:var(--tx3);font-size:11px}
footer a{color:var(--tx3);text-decoration:none}
@media(max-width:720px){.sb{display:none}.mn{padding:1rem}.sg{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- UPDATE MODAL (hidden, triggered by footer) -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <h2>🔒 Atualizar dados</h2>
      <button class="btn" onclick="closeModal()">✕ Fechar</button>
    </div>
    <p>Baixe o CSV em <a href="https://www.tesourotransparente.gov.br/ckan/dataset/taxas-dos-titulos-ofertados-pelo-tesouro-direto" target="_blank" style="color:var(--bl)">Tesouro Transparente</a> e carregue aqui. Um novo <strong>index.html</strong> com os dados atualizados será baixado automaticamente para você subir no GitHub.</p>
    <div class="dz" id="dz" onclick="document.getElementById('fi').click()">
      <p>📂 Arraste o CSV ou clique para selecionar</p>
      <button class="btn btn-p" onclick="event.stopPropagation();document.getElementById('fi').click()">Selecionar arquivo</button>
      <input type="file" id="fi" accept=".csv" style="display:none" onchange="handleCSV(event)">
    </div>
    <div class="prog" id="prog" style="display:none">
      <div class="pb-bar"><div class="pb-fill" id="pbf"></div></div>
      <div style="font-size:12px;color:var(--tx2)" id="pmsg">Processando...</div>
    </div>
    <div class="err" id="err"><p id="errmsg"></p></div>
    <div class="res" id="res">
      <h3>✅ index.html gerado!</h3>
      <p id="res-stats"></p>
      <p>O arquivo foi baixado. Suba-o no GitHub (Add file → Upload files) para atualizar o site público.</p>
      <button class="btn btn-gn" onclick="redownload()">⬇ Baixar novamente</button>
    </div>
  </div>
</div>

<div class="app">
  <nav class="sb">
    <div class="sb-logo"><h2>Tesouro Direto</h2><p>Análise histórica + macro</p></div>
    <span class="db" id="sbd">Demonstração · mai/2026</span>
    <div class="ns">Análise histórica</div>
    <div class="ni on" onclick="sp('ov')"><span>◉</span> Visão geral</div>
    <div class="ni" onclick="sp('hi')"><span>📈</span> Histórico por título</div>
    <div class="ni" onclick="sp('re')"><span>💡</span> Quando resgatar</div>
    <div class="ns">Macro + inteligente</div>
    <div class="ni" onclick="sp('ma')"><span>🏛</span> Painel macro</div>
    <div class="ni" onclick="sp('ti')"><span>⭐</span> Qual título escolher</div>
    <div class="ni" onclick="sp('ce')"><span>🔮</span> Cenários futuros</div>
    <div class="ni" onclick="sp('si')"><span>🧮</span> Simulador</div>
  </nav>
  <main class="mn">

    <div id="pov">
      <div class="ph"><h1>Visão geral</h1><p>Taxas e preços atuais de todos os títulos</p></div>
      <div class="mg" id="ovm"></div>
      <div class="cd">
        <h3>Taxas de compra atuais por título</h3>
        <p style="font-size:12px;color:var(--tx3);margin-bottom:1rem">Comparativo da última data disponível</p>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px" id="lgc"></div>
        <div class="cw"><canvas id="cc" role="img" aria-label="Taxas por título">Comparativo.</canvas></div>
      </div>
      <div class="sl">Clique em um título para ver o histórico</div>
      <div class="tg" id="tco"></div>
    </div>

    <div id="phi" class="hd">
      <div class="ph"><h1>Histórico por título</h1><p>Selecione um título para ver a evolução de taxa e preço</p></div>
      <div class="tg" id="tch"></div>
      <div id="hdd" class="hd">
        <div class="mg" id="hm"></div>
        <div class="rb">
          <button onclick="sr('6m')">6 meses</button>
          <button onclick="sr('1a')">1 ano</button>
          <button class="on" onclick="sr('2a')">2 anos</button>
          <button onclick="sr('5a')">5 anos</button>
          <button onclick="sr('max')">Máximo</button>
        </div>
        <div class="cd"><h3 id="htt">Taxa histórica</h3><p style="font-size:12px;color:var(--tx3);margin-bottom:1rem">% ao ano — quanto maior a taxa, menor o preço unitário</p><div class="cw"><canvas id="ct" role="img" aria-label="Taxa histórica">Taxa.</canvas></div></div>
        <div class="cd"><h3 id="hpt">PU de compra histórico</h3><p style="font-size:12px;color:var(--tx3);margin-bottom:1rem">R$ — inversamente proporcional à taxa</p><div class="cw"><canvas id="cp" role="img" aria-label="PU histórico">PU.</canvas></div></div>
      </div>
    </div>

    <div id="pre" class="hd">
      <div class="ph"><h1>Quando resgatar</h1><p>Guia prático + análise automática do momento atual</p></div>
      <div id="rec"></div>
    </div>

    <div id="pma" class="hd">
      <div class="ph"><h1>Painel macroeconômico</h1><p>Indicadores atualizados · Fonte: Focus/BCB, IBGE, IPEA, FMI</p><span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;background:var(--am-l);color:var(--am-d);display:inline-block;margin-top:6px">Selic em ciclo de corte · IPCA 4,14% · Risco fiscal elevado</span></div>
      <div class="mg" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr))">
        <div class="mc"><div class="ml">Selic atual</div><div class="mv wn">14,75%</div><div class="ms">1.º corte pós-ciclo</div></div>
        <div class="mc"><div class="ml">Selic fim 2026</div><div class="mv">13,00%</div><div class="ms">projeção Focus</div></div>
        <div class="mc"><div class="ml">IPCA 12 meses</div><div class="mv wn">4,14%</div><div class="ms">mar/26 · meta: 3% ±1,5</div></div>
        <div class="mc"><div class="ml">IPCA projetado 2026</div><div class="mv dn">4,80%</div><div class="ms">acima do teto (4,5%)</div></div>
        <div class="mc"><div class="ml">PIB 2026</div><div class="mv up">+1,8%</div><div class="ms">projeção Focus</div></div>
        <div class="mc"><div class="ml">Dívida bruta/PIB</div><div class="mv dn">~79%</div><div class="ms">trajetória ascendente</div></div>
        <div class="mc"><div class="ml">Dólar fin 2026</div><div class="mv">R$ 5,30</div><div class="ms">projeção Focus</div></div>
        <div class="mc"><div class="ml">Juro real</div><div class="mv up">~10,6%</div><div class="ms">2.º maior do mundo</div></div>
      </div>
      <div class="cd"><h3>Sinais para o investidor</h3>
        <div class="sl">Política monetária</div>
        <div class="ir"><span class="in">Selic — ciclo de cortes iniciado</span><span class="iv">14,75%</span><span class="bg bg-am">Atenção</span></div>
        <div class="ir"><span class="in">Projeção Selic dez/2026 (Focus)</span><span class="iv">13,00%</span><span class="bg bg-am">Corte gradual</span></div>
        <div class="ir"><span class="in">Selic projetada 2027 (Focus)</span><span class="iv">11,00%</span><span class="bg bg-gn">Queda contínua</span></div>
        <div class="sl">Inflação</div>
        <div class="ir"><span class="in">IPCA acumulado 12 meses (mar/26)</span><span class="iv">4,14%</span><span class="bg bg-am">Pressionado</span></div>
        <div class="ir"><span class="in">IPCA projetado 2026 (Focus)</span><span class="iv">4,80%</span><span class="bg bg-rd">Acima do teto</span></div>
        <div class="ir"><span class="in">IPCA projetado 2027</span><span class="iv">4,00%</span><span class="bg bg-am">Convergência lenta</span></div>
        <div class="ir"><span class="in">Meta do Banco Central</span><span class="iv">3% ±1,5</span><span class="bg bg-bl">Teto: 4,5%</span></div>
        <div class="sl">Fiscal / Risco Brasil</div>
        <div class="ir"><span class="in">Dívida bruta / PIB (jan/26)</span><span class="iv">~79%</span><span class="bg bg-rd">Trajetória alta</span></div>
        <div class="ir"><span class="in">FMI: dívida projetada 2027</span><span class="iv">~100%</span><span class="bg bg-rd">Risco fiscal alto</span></div>
        <div class="ir"><span class="in">Déficit primário estimado 2026</span><span class="iv">~0,17% PIB</span><span class="bg bg-am">Déficit leve</span></div>
        <div class="ir"><span class="in">Juro real (Selic − IPCA proj.)</span><span class="iv">~10,6%</span><span class="bg bg-gn">2.º maior mundo</span></div>
        <div class="sl">Câmbio e atividade</div>
        <div class="ir"><span class="in">Dólar projetado dez/2026</span><span class="iv">R$ 5,30</span><span class="bg bg-gn">Real valorizado</span></div>
        <div class="ir"><span class="in">PIB 2026 (projeção)</span><span class="iv">+1,8%</span><span class="bg bg-am">Desaceleração</span></div>
      </div>
      <div class="cd"><h3>Leitura atual do mercado</h3><p>O Brasil está em ciclo raro: Selic altíssima (14,75%) com cortes graduais projetados, inflação acima do teto, fiscal deteriorando e juro real próximo de 10,6% — o segundo maior do mundo. Ambiente extremamente favorável à renda fixa. Pós-fixados (Selic) garantem retorno elevado com risco mínimo. O IPCA+ oferece oportunidade de travar taxa real histórica. Prefixados têm apelo se o investidor acredita que a Selic cairá mais do que o mercado projeta.</p></div>
    </div>

    <div id="pti" class="hd">
      <div class="ph"><h1>Qual título escolher agora</h1><p>Recomendações por perfil — cenário mai/2026</p></div>
      <div class="sl">Selecione seu perfil</div>
      <div class="pb-wrap">
        <button class="pb on" onclick="setPerfil('conservador')">Conservador</button>
        <button class="pb" onclick="setPerfil('moderado')">Moderado</button>
        <button class="pb" onclick="setPerfil('arrojado')">Arrojado</button>
      </div>
      <div id="pfc"></div>
    </div>

    <div id="pce" class="hd">
      <div class="ph"><h1>Cenários futuros</h1><p>Como cada cenário macroeconômico afeta os títulos</p></div>
      <div class="cd"><h3>🟢 Cenário base — mais provável (Focus, mai/2026)</h3><p style="font-size:13px;margin-bottom:.75rem">Selic cai de 14,75% para ~13% até dez/2026, depois ~11% em 2027. IPCA converge lentamente. Dívida/PIB sobe para ~85%.</p><div class="sr"><div class="si" style="background:var(--bl-l);color:var(--bl-d)">S</div><div><div class="st">Tesouro Selic — excelente no curto prazo</div><div class="ss">Retorno ainda superior a 13% a.a. até meados de 2027. Risco próximo de zero.</div></div></div><div class="sr"><div class="si" style="background:var(--gn-l);color:var(--gn-d)">I+</div><div><div class="st">Tesouro IPCA+ — oportunidade histórica de taxa real</div><div class="ss">Taxa real de ~7% a.a. Se Selic cair, PU sobe e investidor captura valorização além do contrato.</div></div></div><div class="sr"><div class="si" style="background:var(--am-l);color:var(--am-d)">P</div><div><div class="st">Prefixado — interessante, com risco de taxa persistir</div><div class="ss">Se Selic cair como esperado, ganho de capital. Risco: IPCA teimoso pode forçar BC a pausar.</div></div></div></div>

  document.getElementById('lgc').innerHTML=ns.map(function(n,i){return '<span style="display:flex;align-items:center;gap:4px;font-size:11px"><span style="width:10px;height:10px;border-radius:2px;background:'+cs[i]+'"></span>'+n+': '+rs[i]+'%</span>';}).join('');

  // Title cards — overview and hist
  var h1='',h2='';
  titles.forEach(function(t){var l=gl(groups[t]);if(!l)return;var c=gc(t);var btn='<div class="tb tn" style="font-size:11px;font-weight:700;color:var(--tx);margin-bottom:2px">'+t+'</div><div class="tr" style="color:'+c+';font-size:20px;font-weight:700;margin:3px 0">'+fr(l.TaxaCompraM)+'</div><div class="tt" style="font-size:10px;color:var(--tx3)">'+groups[t].length.toLocaleString('pt-BR')+' registros</div>';
    h1+='<button class="tb" onclick="selOv(''+t.replace(/'/g,"\'")+'')">'+btn+'</button>';
    h2+='<button class="tb" data-t="'+t+'" onclick="selHi(''+t.replace(/'/g,"\'")+'')">'+btn+'</button>';
  });
  document.getElementById('tco').innerHTML=h1;
  document.getElementById('tch').innerHTML=h2;

  // Resgatar
  var now2=new Date(),rh='';
  [{c:'al-gn',t:'Tesouro Selic — resgate a qualquer momento',b:'Liquidez diária real sem perda relevante. Ideal para reserva de emergência. Taxa acompanha a Selic.'},{c:'al-am',t:'Tesouro IPCA+ — atenção ao momento',b:'Taxa atual MAIOR que quando comprou → PU caiu, aguarde. Taxa atual MENOR → PU subiu, bom momento de venda antecipada.'},{c:'al-am',t:'Tesouro Prefixado — só venda se a taxa caiu',b:'Taxa de mercado menor que taxa da sua compra → lucro antecipado. Taxa subiu → leve ao vencimento.'},{c:'al-bl',t:'Títulos com Juros Semestrais — cupons pagam periodicamente',b:'Receba renda a cada 6 meses. Lógica de marcação a mercado igual ao IPCA+ e Prefixado.'},{c:'al-gn',t:'Regra de ouro: taxa alta = preço baixo (comprar); taxa baixa = preço alto (vender)',b:'Quando a taxa atual está abaixo da taxa da sua compra, considere o resgate antecipado do IPCA+ e Prefixado.'}].forEach(function(g){rh+='<div class="al '+g.c+'"><h4>'+g.t+'</h4><p>'+g.b+'</p></div>';});
  rh+='<div class="sl" style="margin-top:1.5rem">Análise automática — taxa atual vs. média histórica (2 anos)</div>';
  titles.forEach(function(t){var rows=groups[t];if(rows.length<20)return;var l=gl(rows);if(!l||!l.TaxaCompraM)return;var ly=rows.filter(function(r){return r._date&&(now2-r._date)<730*86400000;});if(!ly.length)return;var avg2=ly.reduce(function(s,r){return s+(r.TaxaCompraM||0);},0)/ly.length;var curr=l.TaxaCompraM,above=curr>avg2*1.02;rh+='<div class="al '+(above?'al-gn':'al-bl')+'"><h4>'+t+' — taxa '+(above?'acima':'abaixo')+' da média dos últimos 2 anos</h4><p>Atual: <strong>'+fr(curr)+'</strong> · Média 2 anos: <strong>'+fr(avg2)+'</strong> · '+(above?'Momento favorável para compra.':'Favorável para resgate antecipado do IPCA+ e Prefixado.')+'</p></div>';});
  document.getElementById('rec').innerHTML=rh;

  buildPerfil();
})();

// ── HISTORICO ────────────────────────────────────────────────────────
function selOv(n){selTitle=n;sp('hi');selHi(n);}
function selHi(n){
  selTitle=n;
  document.querySelectorAll('#tch .tb').forEach(function(b){b.classList.toggle('on',b.dataset.t===n);});
  document.getElementById('hdd').classList.remove('hd');
  renderHist();
}
function sr(r){
  activeRange=r;
  var map={'6m':'6 meses','1a':'1 ano','2a':'2 anos','5a':'5 anos','max':'Máximo'};
  document.querySelectorAll('.rb button').forEach(function(b){b.classList.toggle('on',b.textContent.trim()===map[r]);});
  if(selTitle) renderHist();
}
function renderHist(){
  if(!selTitle)return;
  var rows=groups[selTitle]||[],f=dec(filtR(rows,activeRange),300);
  var lbs=f.map(function(r){return r._date.toLocaleDateString('pt-BR',{month:'2-digit',year:'2-digit'});});
  var col=gc(selTitle),lat=gl(rows),prev=gpy(rows);
  var diff=(lat&&prev&&lat.TaxaCompraM!=null&&prev.TaxaCompraM!=null)?(lat.TaxaCompraM-prev.TaxaCompraM):null;
  document.getElementById('htt').textContent=selTitle+' — Taxa de compra histórica';
  document.getElementById('hpt').textContent=selTitle+' — PU de compra histórico';
  document.getElementById('hm').innerHTML=
    '<div class="mc"><div class="ml">Taxa atual</div><div class="mv">'+(lat?fr(lat.TaxaCompraM):'—')+'</div><div class="ms">em '+fd(lat&&lat._date)+'</div></div>'+
    '<div class="mc"><div class="ml">PU compra</div><div class="mv" style="font-size:15px">'+(lat?fp(lat.PUCompraM):'—')+'</div><div class="ms">preço unitário</div></div>'+
    '<div class="mc"><div class="ml">Taxa há 1 ano</div><div class="mv" style="font-size:16px">'+(prev?fr(prev.TaxaCompraM):'—')+'</div><div class="ms">em '+fd(prev&&prev._date)+'</div></div>'+
    '<div class="mc"><div class="ml">Var. 12 meses</div><div class="mv '+(diff==null?'':diff>0?'up':'dn')+'" style="font-size:16px">'+(diff!=null?((diff>0?'+':'')+((diff*100).toFixed(2))+'pp'):'—')+'</div><div class="ms">na taxa a.a.</div></div>';
  dc('ct');
  charts['ct']=new Chart(document.getElementById('ct'),{type:'line',data:{labels:lbs,datasets:[{label:'Taxa % a.a.',data:f.map(function(r){return r.TaxaCompraM!=null?+(r.TaxaCompraM*100).toFixed(4):null;}),borderColor:col,backgroundColor:col+'18',fill:true,tension:.3,pointRadius:0,pointHoverRadius:4,borderWidth:1.5,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.parsed.y!=null?c.parsed.y.toFixed(2)+'% a.a.':'—';}}}},scales:{x:{ticks:{maxTicksLimit:10,autoSkip:true},grid:{display:false}},y:{ticks:{callback:function(v){return v+'%';}},grid:{color:'rgba(0,0,0,.05)'}}}}});
  dc('cp');
  charts['cp']=new Chart(document.getElementById('cp'),{type:'line',data:{labels:lbs,datasets:[{label:'PU R$',data:f.map(function(r){return r.PUCompraM!=null?+r.PUCompraM.toFixed(2):null;}),borderColor:'#1D9E75',backgroundColor:'#1D9E7518',fill:true,tension:.3,pointRadius:0,pointHoverRadius:4,borderWidth:1.5,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.parsed.y!=null?'R$ '+c.parsed.y.toLocaleString('pt-BR',{minimumFractionDigits:2}):'—';}}}}},scales:{x:{ticks:{maxTicksLimit:10,autoSkip:true},grid:{display:false}},y:{ticks:{callback:function(v){return 'R$ '+v.toLocaleString('pt-BR');}},grid:{color:'rgba(0,0,0,.05)'}}}}});
}

// ── PERFIL ───────────────────────────────────────────────────────────
var PD={conservador:[{n:'Tesouro Selic',t:'14,75%',c:'#185FA5',rec:true,r:9,d:'Acompanha a Selic dia a dia. Liquidez imediata. Sem marcação a mercado relevante.',m:'Excelente — Selic a 14,75% garante retorno real acima de 10% a.a.',tgs:[{t:'Risco mínimo',c:'bg-gn'},{t:'Liquidez diária',c:'bg-gn'},{t:'Curto prazo',c:'bg-bl'}]},{n:'Tesouro IPCA+ (vencimento ≤2030)',t:'IPCA + ~7%',c:'#1D9E75',rec:false,r:7,d:'Protege contra inflação + taxa real de ~7% ao ano. Prefira vencimentos curtos.',m:'Bom — taxa real histórica. Manter até o vencimento é essencial.',tgs:[{t:'Proteção inflação',c:'bg-gn'},{t:'Taxa real alta',c:'bg-gn'},{t:'Mark-to-market',c:'bg-am'}]}],moderado:[{n:'Tesouro IPCA+ 2035',t:'IPCA + ~7%',c:'#1D9E75',rec:true,r:9,d:'Melhor equilíbrio risco-retorno. Trava taxa real elevada por ~10 anos. Se Selic cair, PU sobe.',m:'Excelente momento — taxas reais próximas de máximas históricas.',tgs:[{t:'Oportunidade histórica',c:'bg-gn'},{t:'Proteção inflação',c:'bg-gn'},{t:'Longo prazo',c:'bg-bl'},{t:'Mark-to-market',c:'bg-am'}]},{n:'Tesouro Selic',t:'14,75%',c:'#185FA5',rec:false,r:8,d:'Manter parte da carteira em Selic para liquidez.',m:'Ainda muito bom no curto prazo. Reduzir à medida que Selic cair.',tgs:[{t:'Liquidez',c:'bg-gn'},{t:'Risco zero',c:'bg-gn'}]},{n:'Tesouro Prefixado 2028',t:'~13,5%',c:'#BA7517',rec:false,r:6,d:'Trava taxa nominal alta. Se Selic cair, PU sobe e há ganho de capital.',m:'Interessante se acredita na queda da Selic. Risco se IPCA persistir.',tgs:[{t:'Taxa nominal alta',c:'bg-am'},{t:'Médio prazo',c:'bg-bl'},{t:'Risco alta Selic',c:'bg-am'}]}],arrojado:[{n:'Tesouro IPCA+ 2045 ou 2055',t:'IPCA + ~7%',c:'#1D9E75',rec:true,r:10,d:'Máxima convexidade — queda de taxa gera valorização exponencial do PU.',m:'Taxa real de 7% em título soberano é excepcional globalmente.',tgs:[{t:'Alta convexidade',c:'bg-gn'},{t:'Máximo retorno potencial',c:'bg-gn'},{t:'Alta volatilidade PU',c:'bg-rd'},{t:'Muito longo prazo',c:'bg-bl'}]},{n:'Tesouro Prefixado 2031',t:'~13,5–14%',c:'#BA7517',rec:false,r:7,d:'Aposta em queda mais intensa da Selic. Ganho de capital se taxa nominal cair para 9–10%.',m:'Para quem acredita em cenário fiscal melhor que o consenso.',tgs:[{t:'Alta alavancagem taxa',c:'bg-am'},{t:'Ganho capital potencial',c:'bg-gn'},{t:'Risco elevado',c:'bg-rd'}]}]};
function setPerfil(p){activePerfil=p;document.querySelectorAll('.pb').forEach(function(b){b.classList.toggle('on',b.textContent.trim().toLowerCase()===p);});buildPerfil();}
function buildPerfil(){var list=PD[activePerfil],rec=list.find(function(x){return x.rec;}),h='';if(rec)h+='<div class="al al-bl" style="margin-bottom:1rem"><h4>Recomendação principal para perfil '+activePerfil+': '+rec.n+'</h4><p>'+rec.m+'</p></div>';list.forEach(function(x){h+='<div class="rc'+(x.rec?' ft':'')+'"><div class="rh"><div><div class="rn">'+(x.rec?'⭐ ':'')+x.n+'</div></div><div class="rr" style="color:'+x.c+'">'+x.t+'</div></div><div class="rd">'+x.d+'</div><div style="font-size:12px;color:#666;margin-bottom:.5rem"><strong>Momento:</strong> '+x.m+'</div><div class="rat">'+Array.from({length:10},function(_,i){return '<div class="rt '+(i<x.r?'on':'off')+'"></div>';}).join('')+'</div><div style="font-size:10px;color:#888;margin-bottom:.5rem">'+x.r+'/10</div><div class="tgs">'+x.tgs.map(function(tg){return '<span class="tg2 '+tg.c+'">'+tg.t+'</span>';}).join('')+'</div></div>';});document.getElementById('pfc').innerHTML=h;}

// ── SIMULADOR ────────────────────────────────────────────────────────
function us(){var v=parseFloat(document.getElementById('sv').value)||10000,a=parseInt(document.getElementById('sp').value)||5,ip=parseFloat(document.getElementById('si2').value)/100,se=parseFloat(document.getElementById('ss').value)/100;document.getElementById('spv').textContent=a;document.getElementById('siv').textContent=(ip*100).toFixed(1).replace('.',',');document.getElementById('ssv').textContent=(se*100).toFixed(1).replace('.',',');var ir=a<=0.5?0.225:a<=1?0.20:a<=2?0.175:0.15;function calc(r){var b=v*Math.pow(1+r,a);return Math.round(v+(b-v)*(1-ir));}function fb(n){return 'R$ '+n.toLocaleString('pt-BR');}var rS=calc(se),rI=calc(ip+0.07),rP=calc(0.135),rPoup=calc(0.065);document.getElementById('smm').innerHTML='<div class="mc"><div class="ml">Tesouro Selic</div><div class="mv up" style="font-size:16px">'+fb(rS)+'</div><div class="ms">líquido de IR</div></div><div class="mc"><div class="ml">Tesouro IPCA+</div><div class="mv up" style="font-size:16px">'+fb(rI)+'</div><div class="ms">líquido de IR</div></div><div class="mc"><div class="ml">Prefixado</div><div class="mv up" style="font-size:16px">'+fb(rP)+'</div><div class="ms">líquido de IR</div></div><div class="mc"><div class="ml">Poupança</div><div class="mv dn" style="font-size:16px">'+fb(rPoup)+'</div><div class="ms">referência</div></div>';var ls=['Hoje'],dS=[v],dI=[v],dP=[v],dPoup=[v];for(var i=1;i<=a;i++){ls.push('Ano '+i);dS.push(Math.round(v*Math.pow(1+se,i)));dI.push(Math.round(v*Math.pow(1+ip+0.07,i)));dP.push(Math.round(v*Math.pow(1+0.135,i)));dPoup.push(Math.round(v*Math.pow(1+0.065,i)));}dc('cs');charts['cs']=new Chart(document.getElementById('cs'),{type:'line',data:{labels:ls,datasets:[{label:'Tesouro Selic',data:dS,borderColor:'#185FA5',backgroundColor:'transparent',fill:false,tension:.3,pointRadius:3,borderWidth:2},{label:'Tesouro IPCA+',data:dI,borderColor:'#1D9E75',backgroundColor:'transparent',fill:false,tension:.3,pointRadius:3,borderWidth:2,borderDash:[5,3]},{label:'Prefixado',data:dP,borderColor:'#BA7517',backgroundColor:'transparent',fill:false,tension:.3,pointRadius:3,borderWidth:2,borderDash:[2,4]},{label:'Poupança',data:dPoup,borderColor:'#888780',backgroundColor:'transparent',fill:false,tension:.3,pointRadius:2,borderWidth:1.5,borderDash:[1,3]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': R$ '+c.parsed.y.toLocaleString('pt-BR');}}}},scales:{x:{grid:{display:false}},y:{ticks:{callback:function(v){return 'R$ '+v.toLocaleString('pt-BR');}},grid:{color:'rgba(0,0,0,.05)'}}}}});document.getElementById('slg').innerHTML=[['#185FA5','Tesouro Selic'],['#1D9E75','Tesouro IPCA+'],['#BA7517','Prefixado'],['#888780','Poupança']].map(function(x){return '<span><span class="ls" style="background:'+x[0]+'"></span>'+x[1]+'</span>';}).join('');}

// ── NAVIGATION ───────────────────────────────────────────────────────
function sp(p){['ov','hi','re','ma','ti','ce','si'].forEach(function(x){var el=document.getElementById('p'+x);if(el)el.classList.toggle('hd',x!==p);});document.querySelectorAll('.ni').forEach(function(b){b.classList.remove('on');});var m={ov:0,hi:1,re:2,ma:3,ti:4,ce:5,si:6};var items=document.querySelectorAll('.ni');if(items[m[p]])items[m[p]].classList.add('on');if(p==='ti')buildPerfil();if(p==='si')us();}

// ── UPDATE MODAL ─────────────────────────────────────────────────────
function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');document.getElementById('res').style.display='none';document.getElementById('err').style.display='none';document.getElementById('prog').style.display='none';}

var dz2=document.getElementById('dz');
dz2.addEventListener('dragover',function(e){e.preventDefault();dz2.classList.add('drag');});
dz2.addEventListener('dragleave',function(){dz2.classList.remove('drag');});
dz2.addEventListener('drop',function(e){e.preventDefault();dz2.classList.remove('drag');var f=e.dataTransfer.files[0];if(f)processUpload(f);});

function handleCSV(evt){var f=evt.target.files[0];if(f)processUpload(f);}

function setP(pct,msg){document.getElementById('pbf').style.width=pct+'%';if(msg)document.getElementById('pmsg').textContent=msg;}

function processUpload(file){
  document.getElementById('prog').style.display='block';
  document.getElementById('res').style.display='none';
  document.getElementById('err').style.display='none';
  setP(10,'Lendo arquivo...');
  var reader=new FileReader();
  reader.onerror=function(){showErr('Erro ao ler o arquivo.');};
  reader.onload=function(e){
    try{
      setP(35,'Analisando CSV...');
      var parsed=Papa.parse(e.target.result,{header:true,skipEmptyLines:true,delimiter:';'});
      if(!parsed.data.length)throw new Error('Arquivo vazio ou delimitador inválido.');
      setP(60,'Processando registros...');
      var keys=Object.keys(parsed.data[0]);
      function get(r,pats){for(var i=0;i<pats.length;i++)for(var j=0;j<keys.length;j++)if(keys[j].toLowerCase().replace(/\s+/g,'').indexOf(pats[i].toLowerCase().replace(/\s+/g,''))>-1)return r[keys[j]];return null;}
      function pd2(str){if(!str)return null;var p=str.trim().split('/');return p.length===3?new Date(+p[2],+p[1]-1,+p[0]).toISOString():null;}
      function pu2(str){if(!str)return null;var v=parseFloat(str.trim().replace(/\./g,'').replace(',','.'));return isNaN(v)?null:v;}
      function pr2(str){if(!str)return null;var v=parseFloat(str.trim().replace(',','.'));return isNaN(v)?null:v/100;}
      var newData=parsed.data.map(function(r){return {n:(get(r,['TipoTitulo','Tipo Titulo','Tipo'])||'').trim(),d:pd2(get(r,['DataBase','Data Base','Data'])),r:pr2(get(r,['TaxaCompraM','Taxa Compra Manha','Taxa Compra Manha'])),p:pu2(get(r,['PUCompraM','PU Compra Manha','PU Compra Manha'])),pv:pu2(get(r,['PUVendaM','PU Venda Manha','PU Venda Manha'])),};}).filter(function(r){return r.d&&r.n;});
      if(!newData.length)throw new Error('Nenhum registro válido encontrado. Verifique se o arquivo é o CSV correto.');
      setP(80,'Gerando index.html...');
      var titles=[...new Set(newData.map(function(r){return r.n;}))];
      var dates=newData.map(function(r){return r.d;}).filter(Boolean).sort();
      var anos2=Math.round((new Date(dates[dates.length-1])-new Date(dates[0]))/86400000/365);
      // Get current page HTML and replace the data
      var currentHTML=document.documentElement.outerHTML;
      var newJSON=JSON.stringify(newData,null,0);
      // Replace everything between RAW = and the closing ];
      var finalHTML=currentHTML.replace(/var RAW = \[[\s\S]*?\];/,'var RAW = '+newJSON+';');
      setP(95,'Preparando download...');
      generatedBlob=new Blob([finalHTML],{type:'text/html;charset=utf-8'});
      redownload();
      document.getElementById('res-stats').textContent=newData.length.toLocaleString('pt-BR')+' registros · '+titles.length+' títulos · '+anos2+' anos de histórico';
      document.getElementById('res').style.display='block';
      document.getElementById('prog').style.display='none';
    }catch(err){showErr(err.message);}
  };
  reader.readAsText(file,'latin1');
}

function redownload(){if(!generatedBlob)return;var url=URL.createObjectURL(generatedBlob);var a=document.createElement('a');a.href=url;a.download='index.html';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(url);},1000);}
function showErr(msg){document.getElementById('err').style.display='block';document.getElementById('errmsg').textContent='❌ '+msg;document.getElementById('prog').style.display='none';}
</script>
